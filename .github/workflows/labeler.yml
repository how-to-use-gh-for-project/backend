name: Backend Auto Labeler

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Auto Labeling based on Branch Name
        uses: actions/github-script@v6
        with:
          script: |
            const branchName = context.payload.pull_request.head.ref.toLowerCase();
            const labels = [];

            // 브랜치 접두사 매핑 규칙
            if (branchName.startsWith('feat/')) labels.push('✨ feat');
            if (branchName.startsWith('fix/') || branchName.startsWith('bug/')) labels.push('🐛 bug');
            if (branchName.startsWith('api/')) labels.push('🧩 api');
            if (branchName.startsWith('db/')) labels.push('🗄️ db');
            if (branchName.startsWith('auth/')) labels.push('🔐 auth');
            if (branchName.startsWith('perf/')) labels.push('⚡ performance');
            if (branchName.startsWith('test/')) labels.push('✅ test');
            if (branchName.startsWith('refactor/')) labels.push('♻️ refactor');
            if (branchName.startsWith('docs/')) labels.push('📝 docs');
            if (branchName.startsWith('chore/')) labels.push('🚚 chore');
            if (branchName.startsWith('security/')) labels.push('🔒 security');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }