name: backend-ci

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Test
        env:
          SPRING_DOCKER_COMPOSE_ENABLED: "false"
        run: ./gradlew test

      - name: Build
        env:
          SPRING_DOCKER_COMPOSE_ENABLED: "false"
        run: ./gradlew build
