name: Test Slack Notification

on:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message to Slack
        run: |
          curl -X POST \
            -H 'Content-type: application/json' \
            --data '{"text":"GitHub Actions에서 보내는 Slack 테스트 메시지입니다."}' \
            "${{ secrets.SLACK_WEBHOOK_URL }}"