name: 백엔드 기능 요청
description: 실습용 백엔드 기능을 제안합니다.
title: "feat(backend): "
labels:
  - type: feature
  - area: backend
body:
  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 어떤 API/백엔드 동작을 추가하나요?
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 완료 기준(AC)
      description: 검증 가능한 기준 2~3개를 작성하세요.
      placeholder: |
        - [ ] 엔드포인트 동작이 구현됨
        - [ ] 유효성 검사/에러 처리가 명확함
        - [ ] test/build 통과
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: 범위 제외
      description: 이번 이슈에서 하지 않을 것을 명시하세요.
      placeholder: 복잡한 도메인 확장, 신규 외부 시스템 연동
    validations:
      required: true
