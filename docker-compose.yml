services:
  db:
    image: mysql:8.0
#    container_name: project-mysql-local
    restart: always
    ports:
      - "3312:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: "project_main_dev"
      MYSQL_USER: "appuser"
      MYSQL_PASSWORD: "appuser"
    volumes:
      - ./mysql_data:/var/lib/mysql # 컨테이너 삭제해도 데이터 유지
      - ./init:/docker-entrypoint-initdb.d # 초기 SQL 자동 실행